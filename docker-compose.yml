services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  init:
    build: .
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      QDRANT_LOCAL_PATH: ""
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      CHAT_STORAGE_DIR: /data/chat_storage
    volumes:
      - chat_data:/data/chat_storage
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    entrypoint: ["python", "-m", "scripts.init"]
    restart: "no"

  backend:
    build: .
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      QDRANT_LOCAL_PATH: ""
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      CHAT_STORAGE_DIR: /data/chat_storage
    volumes:
      - chat_data:/data/chat_storage
    ports:
      - "18080:18080"
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      init:
        condition: service_completed_successfully

volumes:
  qdrant_data:
  ollama_data:
  chat_data:
